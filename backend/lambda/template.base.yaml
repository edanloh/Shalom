AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Base SAM template for Shalom Lambdas (reusable)

# Parameters that you can override on deploy
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [ dev, staging, prod ]
  DBSecretName:
    Type: String
    Default: supabase/shalom_db
  LayerS3Uri:
    Type: String
    Default: '' # optional custom layer location

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [ x86_64 ]
    MemorySize: 128
    Timeout: 25
    EphemeralStorage:
      Size: 512
    Environment:
      Variables:
        DB_SECRET_NAME: !Ref DBSecretName
        NODE_ENV: !Ref Environment
    Policies:
      - Statement:
          - Effect: Allow
            Action:
              - ec2:CreateNetworkInterface
              - ec2:DeleteNetworkInterface
              - ec2:DescribeNetworkInterfaces
            Resource: '*'
      - Statement:
          - Sid: SecretsManagerDbCredentialsAccess
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${DBSecretName}*"

Resources:

  # Shared Layer (optional)
  NodeDependencyLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: shalom-node-deps
      Description: Shared node dependencies for Lambdas
      ContentUri: ./node-dependency-layer
      CompatibleRuntimes:
        - nodejs22.x


  # Example reusable function — you can copy this block for new functions
  GetAllCourseFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "shalom-getAllCourse-${Environment}"
      CodeUri: ./functions/getAllCourse
      Handler: index.handler
      Description: "Returns all courses (shared template)"
      Layers:
        - !Ref NodeDependencyLayer
      Events:
        ApiGetCourses:
          Type: Api
          Properties:
            Path: /courses
            Method: GET
      # VPC config optional: set via parameter or environment — comment out if unused
      # VpcConfig:
      #  SecurityGroupIds: [sg-xxx]
      #  SubnetIds: [subnet-xxx, subnet-yyy]

Outputs:
  GetAllCourseFunctionName:
    Description: "Function name"
    Value: !GetAtt GetAllCourseFunction.Arn