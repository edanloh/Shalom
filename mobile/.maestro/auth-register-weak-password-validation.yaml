appId: com.jasmine02.shalom
---
- extendedWaitUntil:
    visible:
      text: 'Login to your Account'
    timeout: 30000

# Open register and enter weak password to trigger client-side validation
- tapOn: 'Sign Up'
- waitForAnimationToEnd
- assertVisible: 'Create Your Account'

- tapOn:
    text: 'Name'
- inputText: 'Test User'

- tapOn:
    text: 'Email'
- inputText: 'test@example.com'

- tapOn:
    text: 'Password'
- inputText: 'abc'
- hideKeyboard
- tapOn: 'Sign Up'
- waitForAnimationToEnd

# First failed password rule should be shown
- assertVisible: 'Password must be at least 8 characters'

# Return to login and verify
- tapOn: 'Login'
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: 'Login to your Account'
    timeout: 10000
- assertVisible: 'Login to your Account'
