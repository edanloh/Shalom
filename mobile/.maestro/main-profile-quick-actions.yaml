appId: com.jasmine02.shalom
---
- extendedWaitUntil:
    visible: 'Login to your Account'
    timeout: 30000

# Authenticate with CI-provided credentials.
- tapOn:
    text: 'Email'
- inputText: ${MAESTRO_TEST_EMAIL}
- hideKeyboard

- tapOn:
    text: 'Password'
- inputText: ${MAESTRO_TEST_PASSWORD}
- hideKeyboard

- tapOn:
    text: 'Sign In'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: 'Profile'
    timeout: 30000

# Navigate to profile first in case the app lands on a different tab.
- tapOn: 'Profile'
- extendedWaitUntil:
    visible: 'Profile'
    timeout: 20000

# Verify quick-action pages can be opened and closed.
- tapOn: 'Points History'
- extendedWaitUntil:
    visible: 'Points History'
    timeout: 20000
- assertVisible: 'Points History'
- pressKey: Back
- extendedWaitUntil:
    visible: 'Profile'
    timeout: 20000

- tapOn: 'Learning Goal'
- extendedWaitUntil:
    visible: 'Learning Goals'
    timeout: 20000
- assertVisible: 'Learning Goals'
- pressKey: Back
- extendedWaitUntil:
    visible: 'Profile'
    timeout: 20000

- tapOn: 'Certificates'
- extendedWaitUntil:
    visible: 'Certificates'
    timeout: 20000
- assertVisible: 'Certificates'
