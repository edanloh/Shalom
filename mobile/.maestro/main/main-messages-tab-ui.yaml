appId: com.jasmine02.shalom
---
- extendedWaitUntil:
    visible: 'Login to your Account'
    timeout: 30000

# Authenticate with CI-provided credentials.
- tapOn:
    text: 'Email'
- inputText: ${MAESTRO_TEST_EMAIL}
- hideKeyboard

- tapOn:
    text: 'Password'
- inputText: ${MAESTRO_TEST_PASSWORD}
- hideKeyboard

- tapOn:
    text: 'Sign In'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: 'My Courses'
    timeout: 30000

# Open Messages tab and verify core Messages UI.
- tapOn:
    point: '65%, 88%' # Messages tab
- extendedWaitUntil:
    visible: 'Messages'
    timeout: 20000
- assertVisible: 'Messages'
