appId: com.jasmine02.shalom
---
- extendedWaitUntil:
    visible: 'Login to your Account'
    timeout: 30000

- tapOn:
    text: 'Email'
- inputText: ${MAESTRO_TEST_EMAIL}
- hideKeyboard

- tapOn:
    text: 'Password'
- inputText: ${MAESTRO_TEST_PASSWORD}
- hideKeyboard

- tapOn:
    text: 'Sign In'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    point: '50%, 88%' # Skip for now (modal button)
- waitForAnimationToEnd

# Wait for the nav bar — visible on any tab, avoids guessing landing screen
- extendedWaitUntil:
    visible: 'Home'
    timeout: 30000

# Open Messages tab and verify core Messages UI.
- tapOn:
    point: '69%, 91%' # Messages tab
- extendedWaitUntil:
    visible: 'Messages'
    timeout: 20000
- assertVisible: 'Messages'