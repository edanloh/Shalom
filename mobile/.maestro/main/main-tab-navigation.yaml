appId: com.jasmine02.shalom
---
- extendedWaitUntil:
    visible: 'Login to your Account'
    timeout: 30000

- tapOn:
    text: 'Email'
- inputText: ${MAESTRO_TEST_EMAIL}
- hideKeyboard

- tapOn:
    text: 'Password'
- inputText: ${MAESTRO_TEST_PASSWORD}
- hideKeyboard

- tapOn:
    text: 'Sign In'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    point: '50%, 88%' # Skip for now (modal button)
- waitForAnimationToEnd

# Wait for the nav bar — visible on any tab, avoids guessing landing screen
- extendedWaitUntil:
    visible: 'Home'
    timeout: 30000

# Smoke-check each main tab without relying on backend list data.
- tapOn:
    point: '31%, 91%' # Courses tab
- extendedWaitUntil:
    visible: 'Browse Courses'
    timeout: 20000
- assertVisible: 'Browse Courses'

- tapOn:
    point: '50%, 91%' # Notifications tab
- extendedWaitUntil:
    visible: 'Notifications'
    timeout: 20000
- assertVisible: 'Notifications'

- tapOn:
    point: '69%, 91%' # Messages tab
- extendedWaitUntil:
    visible: 'Messages'
    timeout: 20000
- assertVisible: 'Messages'

- tapOn:
    point: '88%, 91%' # Profile tab
- extendedWaitUntil:
    visible: 'Profile'
    timeout: 20000
- assertVisible: 'Profile'