appId: com.jasmine02.shalom
---
- extendedWaitUntil:
    visible: 'Login to your Account'
    timeout: 30000

- tapOn:
    text: 'Email'
- inputText: ${MAESTRO_TEST_EMAIL}
- hideKeyboard

- tapOn:
    text: 'Password'
- inputText: ${MAESTRO_TEST_PASSWORD}
- hideKeyboard

- tapOn:
    text: 'Sign In'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    point: '50%, 88%' # Skip for now (modal button)
- waitForAnimationToEnd

# Wait for the nav bar — visible on any tab, avoids guessing landing screen
- extendedWaitUntil:
    visible: 'Home'
    timeout: 30000

# Open Profile tab and verify core Profile UI.
- tapOn:
    point: '88%, 91%' # Profile tab
- extendedWaitUntil:
    visible: 'Profile'
    timeout: 20000
- assertVisible: 'Profile'
- assertVisible: 'Recent Achievements'
- assertVisible: 'Account Settings'