appId: com.jasmine02.shalom
---
- extendedWaitUntil:
    visible: 'Login to your Account'
    timeout: 30000

# Authenticate with CI-provided credentials.
- tapOn:
    text: 'Email'
- inputText: ${MAESTRO_TEST_EMAIL}
- hideKeyboard

- tapOn:
    text: 'Password'
- inputText: ${MAESTRO_TEST_PASSWORD}
- hideKeyboard

- tapOn:
    text: 'Sign In'
    retryTapIfNoChange: true
- waitForAnimationToEnd

- tapOn:
    point: '50%, 88%' # Skip for now
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: 'Home'
    timeout: 30000

- tapOn:
    point: '50%, 91%' # Notifications tab
- extendedWaitUntil:
    visible: 'Notifications'
    timeout: 20000
- assertVisible: 'Notifications'