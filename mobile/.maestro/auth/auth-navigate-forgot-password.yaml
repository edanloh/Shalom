appId: com.jasmine02.shalom
---
- extendedWaitUntil:
    visible: 'Login to your Account'
    timeout: 30000

# Navigate to Forgot Password screen
- tapOn: 'Forgot Password?'
- assertVisible: 'Forgot Password'
- assertVisible: 'Send Reset Email'

# Submit with empty email — should show validation warning
- tapOn: 'Send Reset Email'
- assertVisible: 'Please enter your email address'

# Navigate back to Login via hardware back button
- pressKey: Back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: 'Login to your Account'
    timeout: 20000
- assertVisible: 'Login to your Account'
