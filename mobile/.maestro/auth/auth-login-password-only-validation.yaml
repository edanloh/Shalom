appId: com.jasmine02.shalom
---
- extendedWaitUntil:
    visible:
      text: 'Login to your Account'
    timeout: 30000

# Enter only password, leave email blank — warning should show
- tapOn:
    text: 'Password'
- inputText: 'Password1!'
- hideKeyboard
- tapOn: 'Sign In'
- waitForAnimationToEnd
- assertVisible: 'Please fill in all the fields'
