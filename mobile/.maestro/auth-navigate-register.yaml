appId: com.jasmine02.shalom
---
- extendedWaitUntil:
    visible:
      text: 'Login to your Account'
    timeout: 30000

# Navigate to the Register screen
- tapOn: 'Sign Up'
- waitForAnimationToEnd
- assertVisible: 'Create Your Account'

# Verify all register form fields are present
- assertVisible: 'Name'
- assertVisible: 'Email'
- assertVisible: 'Password'

# Navigate back to Login via hardware back button (avoids system nav bar overlap)
- pressKey: Back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: 'Login to your Account'
    timeout: 20000
- assertVisible: 'Login to your Account'
