appId: com.jasmine02.shalom
---
- extendedWaitUntil:
    visible:
      text: 'Login to your Account'
    timeout: 30000

# Navigate to the Register screen
- tapOn:
  text: 'Sign Up'
- waitForAnimationToEnd
- assertVisible: 'Create Your Account'

# Verify all register form fields are present
- assertVisible: 'Name'
- assertVisible: 'Email'
- assertVisible: 'Password'

# Navigate back to Login
- scrollUntilVisible:
    element:
      text: 'Login'
    direction: DOWN
- tapOn:
    text: 'Login'
    retryTapIfNoChange: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: 'Login to your Account'
    timeout: 10000
- assertVisible: 'Login to your Account'
