name: Mobile Maestro E2E

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-maestro-e2e.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-maestro-e2e.yml'
  workflow_dispatch:
    inputs:
      apkUrl:
        description: Direct URL to APK or ZIP containing APK (optional)
        required: false
        type: string

jobs:
  maestro-android:
    name: Maestro Android Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      NODE_OPTIONS: --openssl-legacy-provider

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install emulator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse0 libglu1-mesa libxcb-cursor0

      - name: Download APK from URL (optional)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.apkUrl != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL="${{ github.event.inputs.apkUrl }}"
          if [[ "$URL" =~ /artifacts/([0-9]+) ]]; then
            ARTIFACT_ID="${BASH_REMATCH[1]}"
            API_URL="https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip"
            curl -fL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API_URL" \
              -o app-from-url.bin
          else
            curl -fL "$URL" -o app-from-url.bin
          fi
          if unzip -tqq app-from-url.bin >/dev/null 2>&1; then
            mkdir -p apk-from-url
            unzip -oq app-from-url.bin -d apk-from-url
            APK_PATH=$(find apk-from-url -type f -name "*.apk" | head -n 1)
            if [ -z "$APK_PATH" ]; then
              echo "Downloaded ZIP does not contain an APK file."
              exit 1
            fi
            cp "$APK_PATH" app-from-url.apk
          else
            mv app-from-url.bin app-from-url.apk
          fi

      - name: Download existing APK artifact
        id: download_apk
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: 'react-native-cicd prod.yml'
          workflow_conclusion: success
          name: android-prod-apk
          path: .
          if_no_artifact_found: warn

      - name: Detect downloaded APK
        id: apk
        shell: bash
        run: |
          if [ -f "app-from-url.apk" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=app-from-url.apk" >> "$GITHUB_OUTPUT"
          elif [ -f "app-prod.apk" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=app-prod.apk" >> "$GITHUB_OUTPUT"
          elif [ -f "android-prod-apk/app-prod.apk" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=android-prod-apk/app-prod.apk" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "path=app-prod.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.apk.outputs.found != 'true'
        working-directory: mobile
        run: |
          npm ci
          npm install -g eas-cli@latest

      - name: Decrypt google-services.json
        if: steps.apk.outputs.found != 'true'
        working-directory: mobile
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -f "google-services.json.gpg" ] && [ -z "$GPG_PASSPHRASE" ]; then
            echo "GPG_PASSPHRASE secret is required to decrypt google-services.json.gpg"
            exit 1
          fi
          chmod +x eas-pre-install.sh
          ./eas-pre-install.sh

      - name: Build Production Android APK (EAS local)
        if: steps.apk.outputs.found != 'true'
        working-directory: mobile
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          NODE_ENV: production
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output=../app-prod.apk

      - name: Run Maestro smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          emulator-boot-timeout: 900
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -camera-back none -gpu swiftshader_indirect -no-metrics -memory 2048
          disable-animations: true
          script: |
            adb wait-for-device
            adb devices
            adb install -r "${{ steps.apk.outputs.path }}"
            curl -Ls "https://get.maestro.mobile.dev" | bash
            "$HOME/.maestro/bin/maestro" --version
            APP_ID="com.jasmine02.shalom"

            dismiss_system_dialogs() {
              local ui
              ui="$(adb exec-out uiautomator dump /dev/tty 2>/dev/null || true)"

              # "System UI isn't responding" dialog
              if echo "$ui" | grep -q 'resource-id="android:id/aerr_wait"'; then
                adb shell input tap 720 1454 || true
                sleep 2
              fi

              # "<App> keeps stopping" dialog
              if echo "$ui" | grep -q 'resource-id="android:id/aerr_close"'; then
                adb shell input tap 720 1454 || true
                sleep 2
              fi
            }

            wait_for_login_screen() {
              local attempt ui
              for attempt in 1 2 3 4 5; do
                echo "Preflight attempt ${attempt}: launch app and verify login screen"
                adb shell am force-stop "$APP_ID" || true
                sleep 1
                adb shell monkey -p "$APP_ID" -c android.intent.category.LAUNCHER 1 >/dev/null 2>&1 || true
                sleep 8
                dismiss_system_dialogs

                ui="$(adb exec-out uiautomator dump /dev/tty 2>/dev/null || true)"
                if echo "$ui" | grep -q 'Login to your Account'; then
                  echo "Login screen is visible"
                  return 0
                fi
              done

              echo "Login screen did not appear after retries"
              return 1
            }

            adb logcat -c || true
            LOGCAT_FILE="/tmp/maestro-logcat.txt"
            : > "$LOGCAT_FILE"

            overall_exit=0
            for flow in $(find mobile/.maestro -maxdepth 1 -type f -name "*.yaml" | sort); do
              echo "===== Running flow: ${flow} ====="
              if ! wait_for_login_screen; then
                echo "Preflight failed before ${flow}"
                adb logcat -d | tee -a "$LOGCAT_FILE" | tail -n 400 || true
                overall_exit=1
                continue
              fi

              if ! "$HOME/.maestro/bin/maestro" test "$flow"; then
                echo "Flow failed: ${flow}"
                adb logcat -d | tee -a "$LOGCAT_FILE" | tail -n 400 || true
                overall_exit=1
              fi
            done

            exit $overall_exit

      - name: Upload Maestro debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug-artifacts
          path: /home/runner/.maestro/tests
          if-no-files-found: warn

      - name: Upload Android logcat artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-logcat
          path: /tmp/maestro-logcat.txt
          if-no-files-found: warn
