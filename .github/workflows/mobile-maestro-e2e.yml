name: Mobile Maestro E2E

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-maestro-e2e.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-maestro-e2e.yml'
  workflow_dispatch:

jobs:
  maestro-android:
    name: Maestro Android Smoke Test
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --openssl-legacy-provider

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: |
          npm ci
          npm install -g eas-cli@latest

      - name: Decrypt google-services.json
        working-directory: mobile
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -f "google-services.json.gpg" ] && [ -z "$GPG_PASSPHRASE" ]; then
            echo "GPG_PASSPHRASE secret is required to decrypt google-services.json.gpg"
            exit 1
          fi
          chmod +x eas-pre-install.sh
          ./eas-pre-install.sh

      - name: Build Development Android APK (EAS local)
        working-directory: mobile
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          NODE_ENV: development
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
          eas build \
            --platform android \
            --profile development \
            --local \
            --non-interactive \
            --output=../app-dev.apk

      - name: Run Maestro smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          script: |
            adb wait-for-device
            adb install -r app-dev.apk
            curl -Ls "https://get.maestro.mobile.dev" | bash
            export PATH="$PATH:$HOME/.maestro/bin"
            maestro --version
            maestro test mobile/.maestro/smoke.yaml
