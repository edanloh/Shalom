name: Mobile Maestro E2E

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-maestro-e2e.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-maestro-e2e.yml'
  workflow_dispatch:
    inputs:
      apkUrl:
        description: Direct URL to APK or ZIP containing APK (optional)
        required: false
        type: string

jobs:
  maestro-android:
    name: Maestro Android E2E Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install emulator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse0 libglu1-mesa libxcb-cursor0

      - name: Cache Maestro CLI
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-${{ runner.os }}-v1

      - name: Download APK from URL (optional)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.apkUrl != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL="${{ github.event.inputs.apkUrl }}"
          if [[ "$URL" =~ /artifacts/([0-9]+) ]]; then
            ARTIFACT_ID="${BASH_REMATCH[1]}"
            API_URL="https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip"
            curl -fL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API_URL" \
              -o app-from-url.bin
          else
            curl -fL "$URL" -o app-from-url.bin
          fi
          if unzip -tqq app-from-url.bin >/dev/null 2>&1; then
            mkdir -p apk-from-url
            unzip -oq app-from-url.bin -d apk-from-url
            APK_PATH=$(find apk-from-url -type f -name "*.apk" | head -n 1)
            if [ -z "$APK_PATH" ]; then
              echo "Downloaded ZIP does not contain an APK file."
              exit 1
            fi
            cp "$APK_PATH" app-from-url.apk
          else
            mv app-from-url.bin app-from-url.apk
          fi

      - name: Download existing APK artifact
        id: download_apk
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: 'react-native-cicd prod.yml'
          workflow_conclusion: success
          name: android-prod-apk
          path: .
          if_no_artifact_found: warn

      - name: Detect downloaded APK
        id: apk
        shell: bash
        run: |
          if [ -f "app-from-url.apk" ]; then
            echo "path=app-from-url.apk" >> "$GITHUB_OUTPUT"
          elif [ -f "app-prod.apk" ]; then
            echo "path=app-prod.apk" >> "$GITHUB_OUTPUT"
          elif [ -f "android-prod-apk/app-prod.apk" ]; then
            echo "path=android-prod-apk/app-prod.apk" >> "$GITHUB_OUTPUT"
          else
            echo "No APK found. Provide one via the apkUrl input or ensure the android-prod-apk artifact exists from a previous build."
            exit 1
          fi

      - name: Run Maestro test suite on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          MAESTRO_TEST_EMAIL: ${{ secrets.MAESTRO_TEST_EMAIL }}
          MAESTRO_TEST_PASSWORD: ${{ secrets.MAESTRO_TEST_PASSWORD }}
        with:
          api-level: 31
          target: default
          arch: x86_64
          profile: pixel_xl
          cores: 2
          ram-size: 3072
          emulator-boot-timeout: 900
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -camera-back none -gpu swiftshader_indirect -no-metrics -memory 2048
          disable-animations: true
          script: |
            adb wait-for-device
            adb devices
            adb install -r "${{ steps.apk.outputs.path }}"
            [ -x "$HOME/.maestro/bin/maestro" ] || curl -Ls "https://get.maestro.mobile.dev" | bash
            "$HOME/.maestro/bin/maestro" --version
            bash mobile/.maestro/run-ci-suite.sh

      - name: Publish Maestro summary
        if: always()
        shell: bash
        run: |
          LOG_FILE="/tmp/maestro-suite.log"
          {
            echo "## Maestro E2E Summary"
            if [ -f "$LOG_FILE" ]; then
              PASSED_TOTAL_LINE="$(grep -E '^Passed/Total: ' "$LOG_FILE" | tail -n 1 || true)"
              FAILED_COUNT_LINE="$(grep -E '^Failed: ' "$LOG_FILE" | tail -n 1 || true)"
              SKIPPED_COUNT_LINE="$(grep -E '^Skipped: ' "$LOG_FILE" | tail -n 1 || true)"

              if [ -n "$PASSED_TOTAL_LINE" ]; then
                echo "- $PASSED_TOTAL_LINE"
              else
                echo "- Passed/Total: unavailable"
              fi

              if [ -n "$FAILED_COUNT_LINE" ]; then
                echo "- $FAILED_COUNT_LINE"
              fi

              if [ -n "$SKIPPED_COUNT_LINE" ]; then
                echo "- $SKIPPED_COUNT_LINE"
              fi

              echo ""
              echo "### Flow Status"
              FLOW_STATUS_LINES="$(grep -E '^Flow status: ' "$LOG_FILE" || true)"
              if [ -n "$FLOW_STATUS_LINES" ]; then
                echo "$FLOW_STATUS_LINES" | sed 's/^/- /'
              else
                echo "- No per-flow status lines found."
              fi

              if grep -q '^Failed flows:' "$LOG_FILE"; then
                echo ""
                echo "### Failed Flows"
                awk '/^Failed flows:/{flag=1; next} /^=====/{if (flag) exit} flag {print}' "$LOG_FILE" \
                  | sed '/^\s*$/d' \
                  | sed 's/^/- /'
              fi
            else
              echo "- Maestro run log not found at $LOG_FILE"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Maestro debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug-artifacts
          path: /home/runner/.maestro/tests
          if-no-files-found: warn

      - name: Upload Android logcat artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-logcat
          path: /tmp/maestro-logcat.txt
          if-no-files-found: warn
