name: Mobile Maestro E2E

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-maestro-e2e.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-maestro-e2e.yml'
  workflow_dispatch:

jobs:
  maestro-android:
    name: Maestro Android Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            mobile/package-lock.json
            package-lock.json

      - name: Detect project paths
        id: paths
        shell: bash
        run: |
          if [ -f "mobile/package.json" ]; then
            echo "project_dir=mobile" >> "$GITHUB_OUTPUT"
            echo "android_dir=mobile/android" >> "$GITHUB_OUTPUT"
            echo "apk_path=mobile/android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
            echo "flow_path=mobile/.maestro/smoke.yaml" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
            echo "project_dir=." >> "$GITHUB_OUTPUT"
            echo "android_dir=./android" >> "$GITHUB_OUTPUT"
            echo "apk_path=./android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
            echo "flow_path=.maestro/smoke.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "Could not find JS project folder (expected mobile/package.json or package.json)."
            exit 1
          fi

      - name: Install dependencies
        working-directory: ${{ steps.paths.outputs.project_dir }}
        run: npm ci

      - name: Ensure Android native project exists
        working-directory: ${{ steps.paths.outputs.project_dir }}
        run: |
          if [ ! -d "android" ]; then
            npx expo prebuild --platform android --non-interactive
          fi

      - name: Build Android debug APK
        working-directory: ${{ steps.paths.outputs.android_dir }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Run Maestro smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          script: |
            adb wait-for-device
            adb install -r "${{ steps.paths.outputs.apk_path }}"
            curl -Ls "https://get.maestro.mobile.dev" | bash
            export PATH="$PATH:$HOME/.maestro/bin"
            maestro --version
            maestro test "${{ steps.paths.outputs.flow_path }}"
