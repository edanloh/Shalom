name: Mobile Maestro E2E

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-maestro-e2e.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-maestro-e2e.yml'
  workflow_dispatch:
    inputs:
      apkUrl:
        description: 'Direct URL to APK or ZIP containing APK (optional)'
        required: false
        type: string

jobs:
  maestro-android:
    name: Maestro Android Smoke Test
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --openssl-legacy-provider

    steps:

      # -------------------------------
      # Checkout repo
      # -------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------
      # Download APK from URL (manual run)
      # -------------------------------
      - name: Download APK from URL
        id: apk_url
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.apkUrl != ''
        shell: bash
        run: |
          echo "Downloading APK from URL: ${{ github.event.inputs.apkUrl }}"
          curl -fL "${{ github.event.inputs.apkUrl }}" -o app-from-url.apk
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "path=app-from-url.apk" >> "$GITHUB_OUTPUT"

      # -------------------------------
      # Download previous artifact
      # -------------------------------
      - name: Download existing APK artifact
        id: apk_artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: react-native-cicd.yml
          workflow_conclusion: success
          name: android-dev-apk
          path: .
          if_no_artifact_found: warn

      # -------------------------------
      # Detect APK (URL > Artifact > Local build)
      # -------------------------------
      - name: Detect APK
        id: apk
        shell: bash
        run: |
          if [ -f "app-from-url.apk" ]; then
            echo "Using APK from URL"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=app-from-url.apk" >> "$GITHUB_OUTPUT"
          elif [ -f "android-dev-apk/app-dev.apk" ]; then
            echo "Using APK from artifact"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=android-dev-apk/app-dev.apk" >> "$GITHUB_OUTPUT"
          else
            echo "No APK found, will build locally"
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "path=app-dev.apk" >> "$GITHUB_OUTPUT"
          fi

      # -------------------------------
      # Setup Java & Node (for build only)
      # -------------------------------
      - name: Setup Java
        if: steps.apk.outputs.found != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        if: steps.apk.outputs.found != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      # -------------------------------
      # Install dependencies & decrypt (for build only)
      # -------------------------------
      - name: Install dependencies
        if: steps.apk.outputs.found != 'true'
        working-directory: mobile
        run: |
          npm ci
          npm install -g eas-cli

      - name: Decrypt google-services.json
        if: steps.apk.outputs.found != 'true'
        working-directory: mobile
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          chmod +x eas-pre-install.sh
          ./eas-pre-install.sh

      # -------------------------------
      # Build APK (for build only)
      # -------------------------------
      - name: Build Development APK (EAS local)
        if: steps.apk.outputs.found != 'true'
        working-directory: mobile
        run: |
          eas build \
            --platform android \
            --profile development \
            --local \
            --non-interactive \
            --output=../app-dev.apk

      # -------------------------------
      # Run Maestro E2E on emulator
      # -------------------------------
      - name: Run Maestro smoke tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            echo "Restarting ADB for stability..."
            adb kill-server
            adb start-server
            adb wait-for-device

            echo "Installing APK..."
            adb install -r "${{ steps.apk.outputs.path }}"

            echo "Installing Maestro..."
            curl -Ls https://get.maestro.mobile.dev | bash
            export PATH="$PATH:$HOME/.maestro/bin"

            maestro --version
            echo "Running Maestro tests..."
            maestro test mobile/.maestro/smoke.yaml